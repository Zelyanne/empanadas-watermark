<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark - Empanadas et Régala</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }
        .card {
            background: #fff;
            max-width: 900px;
            width: 100%;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-size: 24px; color: #222; }
        .sub { color: #888; margin: 6px 0 24px; font-size: 14px; }

        #drop-area {
            border: 3px dashed #D4AF37;
            border-radius: 10px;
            padding: 36px 20px;
            cursor: pointer;
            transition: background .2s;
        }
        #drop-area:hover { background: #fef9ed; }
        #drop-area p { font-size: 15px; color: #555; }

        .controls {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .controls label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
        }
        .controls input[type="range"] { width: 180px; }

        .file-list {
            margin: 14px 0;
            font-size: 13px;
            color: #555;
            max-height: 100px;
            overflow-y: auto;
        }

        .btn {
            background: #D4AF37;
            color: #fff;
            border: none;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: background .2s;
        }
        .btn:hover { background: #c19b2e; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        #progress-wrap { display: none; margin: 16px 0; }
        #progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: #D4AF37;
            transition: width .3s;
        }
        #progress-text { font-size: 13px; color: #666; margin-top: 6px; }
        #status { margin-top: 12px; font-size: 13px; color: #666; min-height: 20px; }

        #gallery {
            display: none;
            margin-top: 24px;
            text-align: left;
        }
        #gallery h2 { font-size: 16px; margin-bottom: 12px; color: #333; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .grid-item {
            background: #fafafa;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }
        .grid-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
        .grid-item .name {
            padding: 6px 10px;
            font-size: 12px;
            color: #555;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .grid-item .save-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #D4AF37;
            color: #fff;
            border: none;
            font-size: 13px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .grid-item .save-btn:active { background: #c19b2e; }

        #upload-hint {
            font-size: 13px;
            color: #999;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Empanadas et Régala</h1>
    <p class="sub">Drop your photos to add the watermark</p>

    <form id="uploadForm" enctype="multipart/form-data">
        <div id="drop-area">
            <p>Drop images here or <strong>browse</strong></p>
            <div id="upload-hint">(Works best on desktop)</div>
            <input type="file" name="images" id="fileInput" accept="image/*" multiple required hidden>
        </div>

        <div class="controls">
            <label>
                Opacity
                <input type="range" name="opacity" id="opacitySlider" min="1" max="100" value="25">
                <span id="opacityVal">25%</span>
            </label>
            <label>
                Logo size
                <input type="range" name="size" id="sizeSlider" min="5" max="80" value="30">
                <span id="sizeVal">30%</span>
            </label>
        </div>

        <div class="file-list" id="fileList"></div>
        <div id="upload-hint">Tap "Save to Photos" on any image, then iOS share sheet</div>

        <div id="progress-wrap">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="progress-text">Processing...</div>
        </div>

        <div id="status"></div>
        <button type="submit" class="btn" id="submitBtn" disabled>Watermark images</button>
    </form>

    <div id="gallery">
        <h2 id="gallery-title">Watermarked images</h2>
        <div class="grid" id="galleryGrid"></div>
    </div>
</div>

<script>
const form = document.getElementById('uploadForm');
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const status = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');
const gallery = document.getElementById('gallery');
const galleryGrid = document.getElementById('galleryGrid');

let latestZipBlob = null;

opacitySlider.addEventListener('input', () => { opacityVal.textContent = opacitySlider.value + '%'; });
sizeSlider.addEventListener('input', () => { sizeVal.textContent = sizeSlider.value + '%'; });

['dragenter','dragover','dragleave','drop'].forEach(e => {
    dropArea.addEventListener(e, e => { e.preventDefault(); e.stopPropagation(); });
});
dropArea.addEventListener('drop', e => { selectFiles(e.dataTransfer.files); });
dropArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => selectFiles(fileInput.files));

function selectFiles(list) {
    if (list.length === 0) return;
    fileInput.files = list;
    fileList.innerHTML = Array.from(list).map(f => '<span>• ' + f.name + '</span>').join('');
    uploadHint.style.display = 'none';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Watermark ' + list.length + ' image(s)';
    status.textContent = '';
    gallery.style.display = 'none';
    galleryGrid.innerHTML = '';
    latestZipBlob = null;
}

form.addEventListener('submit', async e => {
    e.preventDefault();
    const files = fileInput.files;
    if (!files || files.length === 0) {
        status.textContent = 'Please select images first';
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Processing...';
    progressWrap.style.display = 'block';
    gallery.style.display = 'none';
    latestZipBlob = null;

    const fd = new FormData();
    for (const f of files) fd.append('images', f);
    fd.append('opacity', opacitySlider.value);
    fd.append('size', sizeSlider.value);

    try {
        progressText.textContent = 'Uploading...';
        const res = await fetch('/watermark', { method: 'POST', body: fd });
        if (!res.ok) { status.textContent = 'Error: ' + await res.text(); reset(); return; }

        progressText.textContent = 'Downloading...';
        const reader = res.body.getReader();
        const contentLength = +res.headers.get('Content-Length');
        let received = 0;
        const chunks = [];
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (contentLength) progressFill.style.width = Math.round(received / contentLength * 100) + '%';
            progressText.textContent = (received / 1024 / 1024).toFixed(1) + ' MB received';
        }
        latestZipBlob = new Blob(chunks, { type: 'application/zip' });

        progressText.textContent = 'Extracting images...';
        progressFill.style.width = '100%';

        const zip = await JSZip.loadAsync(latestZipBlob);
        const entries = Object.entries(zip.files).filter(([n]) => !n.startsWith('_error_') && !n.startsWith('__'));
        galleryGrid.innerHTML = '';
        for (const [name, file] of entries) {
            const blob = await file.async('blob');
            const url = URL.createObjectURL(blob);
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerHTML = '<img src="' + url + '" alt="' + name + '">' +
                '<div class="name">' + name + '</div>' +
                '<button class="save-btn" data-url="' + url + '" data-name="' + name + '">Save to Photos</button>';
            galleryGrid.appendChild(item);
        }

        gallery.style.display = 'block';
        progressWrap.style.display = 'none';
        status.textContent = '✓ Done — ' + files.length + ' image(s). Tap "Save to Photos".';
    } catch (err) {
        status.textContent = 'Error: ' + err.message;
        reset();
    }
});

document.addEventListener('click', e => {
    if (e.target.classList.contains('save-btn')) {
        const url = e.target.dataset.url;
        const name = e.target.dataset.name;
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
});

function reset() {
    setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Watermark images';
        progressWrap.style.display = 'none';
    }, 2000);
}
</script>
</body>
</html>
